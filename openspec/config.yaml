# openspec/config.yaml — SDD configuration for eventos
# Refreshed by sdd-init on 2026-06-23
schema: spec-driven

context: |
  Project: eventos — HI.EVENTS (Trabajo Fin de Master)
  Stack: Laravel 12.60.2, PHP 8.4+, SQLite testing database
  Architecture: Fresh Laravel 12 default structure with laravel-ai-boilerplate conventions
    (Action pattern, DTOs, ViewModels, Resources, FormRequests). No custom domain yet.
  Testing: Pest 4.7 with Laravel and Browser plugins, PHPUnit 12.5 fallback. Tests in tests/Unit and tests/Feature currently use PHPUnit-style classes.
  Style: Laravel Pint 1.29, PHPStan/Larastan 3.9 level 8, Rector 2.4 with Laravel sets
  Frontend: Tailwind CSS 4, Vite 7 via laravel-vite-plugin 2
  Queue/Cache/Session: testing config uses sync queue, array cache, array session
  Auth: Laravel built-in (no Breeze/Jetstream installed yet)
  CI: No GitHub Actions workflow configured yet
  Reference boilerplate at laravel-ai-boilerplate/ with Action-based architecture

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "vendor/bin/sail composer run test"
  verify:
    test_command: "vendor/bin/sail composer run test"
    build_command: "vendor/bin/sail composer run pint -- --test && vendor/bin/sail composer run phpstan"
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    command: vendor/bin/sail composer run test
    framework: Pest 4.7.0 via composer script
    fallback: vendor/bin/sail php vendor/bin/phpunit (PHPUnit 12.5.24)
  layers:
    unit:
      available: true
      path: tests/Unit
      tool: Pest runner with PHPUnit-style tests currently present
    feature:
      available: true
      path: tests/Feature
      tool: Pest runner with Laravel plugin; PHPUnit-style feature test currently present
    e2e:
      available: true
      path: tests/Browser (not created yet)
      tool: Pest Browser plugin 4.3.1
  coverage:
    available: conditional
    command: vendor/bin/sail php vendor/bin/pest --coverage
    note: Requires a PHP coverage driver such as Xdebug or PCOV.
  quality:
    linter:
      available: true
      command: vendor/bin/sail composer run pint -- --test
      tool: Laravel Pint 1.29.1 (Laravel preset)
    type_checker:
      available: true
      command: vendor/bin/sail composer run phpstan
      tool: PHPStan / Larastan 3.9.6 (level 8)
    formatter:
      available: true
      command: vendor/bin/sail composer run pint
      tool: Laravel Pint 1.29.1
    rector:
      available: true
      command: vendor/bin/sail composer run rector
      tool: Rector 2.4.4 with rector-laravel 2.4.0 (UP_TO_PHP_84, UP_TO_LARAVEL_120)
